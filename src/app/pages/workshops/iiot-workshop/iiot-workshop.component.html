<div class="workshop-container">
    <h2 class="workshop-heading">Advanced IIoT Workshop with Embedded Systems</h2>

    <div class="workshop-list">
        <div class="workshop-card" *ngFor="let module of workshopModules">
            <!-- Show image only if it exists -->
            <div class="image-wrapper" *ngIf="module.image">
                <img [src]="module.image" [alt]="module.title" class="module-img">
            </div>
            <div class="module-content">
                <h3 class="module-title">{{ module.title }}</h3>
                <ul class="bullet-list">
                    <li *ngFor="let point of module.points">{{ point }}</li>
                </ul>
            </div>
        </div>
    </div>
</div>
